name: Link Check

on:
  pull_request:
    paths:
      - 'README.md'
  schedule:
    - cron: '0 6 * * 1' # every Monday, 06:00 UTC
  workflow_dispatch:

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config .github/lychee.toml README.md
          format: markdown
          output: ./lychee/out.md
          fail: ${{ github.event_name == 'pull_request' }}

      - name: Open/update an issue with broken links (scheduled runs only)
        if: github.event_name == 'schedule' && steps.lychee.outcome == 'failure'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'Broken links found in README.md'
          content-filepath: ./lychee/out.md
          labels: broken-links, automated
